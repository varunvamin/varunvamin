name: Generate Metrics

on:
  # Run automatically every 24 hours
  schedule:
    - cron: "0 0 * * *"
  
  # Allows manual triggering
  workflow_dispatch:
  
  # Run on push to main
  push:
    branches:
      - main
      - master

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate github-metrics.svg
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          # Use the default GITHUB_TOKEN (no PAT required!)
          token: ${{ secrets.GITHUB_TOKEN }}
          
          # Push to the same output branch the snake uses
          committer_branch: output
          
          # Styling to match your profile
          config_theme: tokyonight
          
          # Include basic stats and languages
          base: header, repositories
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 6
